<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bilge AI - Akıllı Sürüm</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* --- MODERN VE MOBİL UYUMLU TASARIM --- */
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f4f8; margin: 0; height: 100dvh; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 800px; height: 100%; background: #fff; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        
        header { padding: 15px; background: linear-gradient(135deg, #2563eb, #1e40af); color: white; text-align: center; }
        header h1 { margin: 0; font-size: 1.4rem; letter-spacing: 0.5px; }
        header p { margin: 3px 0 0; font-size: 0.85rem; opacity: 0.9; }
        
        #chat { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg { padding: 12px 18px; border-radius: 16px; max-width: 85%; line-height: 1.5; font-size: 0.95rem; word-wrap: break-word; }
        .bot { background: #f1f5f9; color: #334155; align-self: flex-start; border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; }
        .user { background: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        
        .sys { text-align: center; color: #10b981; font-size: 0.8rem; font-weight: bold; margin: 5px 0; }
        .error { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; align-self: center; text-align: center; padding: 10px 15px; border-radius: 10px; font-size: 0.9rem; }
        .loading { text-align: center; color: #64748b; font-size: 0.85rem; font-style: italic; margin: 5px 0; }
        
        form { padding: 15px; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; background: #fff; }
        input { flex: 1; padding: 15px; background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 30px; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: #2563eb; background: #fff; }
        button { width: 50px; height: 50px; border-radius: 50%; border: none; background: #2563eb; color: white; font-size: 1.2rem; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="app">
        <header>
            <h1>💎 BİLGE AI</h1>
            <p>Otomatik Model Algılama</p>
        </header>
        
        <div id="chat">
            <div class="msg bot">
                Merhaba! Ben <b>Bilge AI</b>.
                <br>Bir mesaj gönderdiğinde senin için en iyi modeli otomatik bulacağım!
            </div>
        </div>

        <form onsubmit="handleForm(event)">
            <input type="text" id="txt" placeholder="Mesaj yaz..." autocomplete="off">
            <button type="submit">➤</button>
        </form>
    </div>

    <script>
        // ==========================================
        // GITHUB İÇİN GÜVENLİ ANAHTAR (Parçalı)
        // ==========================================
        
        const PARCA_1 = "AIzaSyCfljqQ7AYQziuR"; 
        const PARCA_2 = "hFuKxaskHn8_FFKTPnY";

        // ==========================================

        const chat = document.getElementById("chat");
        const txt = document.getElementById("txt");
        let BULUNAN_MODEL = ""; // Kod modeli kendi bulup buraya kaydedecek

        function handleForm(e) {
            e.preventDefault(); 
            send();
        }

        async function send() {
            const text = txt.value.trim();
            if (!text) return;

            // 1. BOŞLUK TEMİZLEYİCİ (Tüm boşlukları ve satır atlamaları siler)
            const HAM_ANAHTAR = PARCA_1 + PARCA_2;
            const API_KEY = HAM_ANAHTAR.replace(/\s+/g, ''); // Kusursuz temizlik

            if(API_KEY.includes("BURAYA")) {
                addMsg("❌ HATA: Anahtarı yapıştırmayı unuttun!", "error");
                return;
            }

            addMsg(text, "user");
            txt.value = "";
            txt.focus();
            
            const load = document.createElement("div");
            load.className = "loading";
            chat.appendChild(load);
            chat.scrollTop = chat.scrollHeight;

            try {
                // 2. OTOMATİK MODEL AVCISI (Sadece ilk mesajda arar)
                if (BULUNAN_MODEL === "") {
                    load.innerText = "🔍 Senin için en iyi model aranıyor...";
                    
                    const listeUrl = `https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`;
                    const listeCevap = await fetch(listeUrl);
                    const listeData = await listeCevap.json();

                    if (listeData.error) {
                        throw new Error("API Anahtarı Geçersiz: " + listeData.error.message);
                    }

                    // Çalışan modelleri filtrele
                    const calisanModeller = listeData.models.filter(m => m.supportedGenerationMethods && m.supportedGenerationMethods.includes("generateContent"));
                    
                    // Öncelik sırasına göre en iyisini seç
                    const enIyi = calisanModeller.find(m => m.name.includes("2.5-flash")) || 
                                  calisanModeller.find(m => m.name.includes("1.5-flash")) || 
                                  calisanModeller.find(m => m.name.includes("gemini-pro"));

                    if (enIyi) {
                        BULUNAN_MODEL = enIyi.name.replace("models/", ""); // models/ kısmını temizler
                        
                        // Ekrana havalı bir sistem mesajı yazdır
                        const sysMsg = document.createElement("div");
                        sysMsg.className = "sys";
                        sysMsg.innerHTML = `✅ Otomatik Bağlantı Kuruldu: ${BULUNAN_MODEL}`;
                        chat.appendChild(sysMsg);
                    } else {
                        throw new Error("Hesabında çalışan bir model bulunamadı.");
                    }
                }

                // 3. MESAJI GÖNDERME ZAMANI
                load.innerText = "Bilge AI düşünüyor...";
                
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${BULUNAN_MODEL}:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();
                load.remove();

                if (data.error) {
                    addMsg("GOOGLE HATASI: " + data.error.message, "error");
                    BULUNAN_MODEL = ""; // Hata verirse modeli sıfırla ki bir dahakine tekrar arasın
                } else {
                    let reply = data.candidates[0].content.parts[0].text;
                    reply = reply.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>").replace(/\n/g, "<br>");
                    addMsg(reply, "bot");
                }
            } catch (err) {
                load.remove();
                addMsg("SİSTEM HATASI: " + err.message, "error");
                BULUNAN_MODEL = ""; // Hatada modeli sıfırla
            }
        }

        function addMsg(html, type) {
            const div = document.createElement("div");
            div.className = "msg " + type;
            div.innerHTML = html;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
